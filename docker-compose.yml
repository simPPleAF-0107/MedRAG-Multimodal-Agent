version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: medrag_backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./.env:/app/.env
      - ./medrag.db:/app/medrag.db
      - ./vector-db:/app/vector-db
      # For image saving/uploads
      - ./data:/app/data
    restart: unless-stopped

  frontend-web:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: medrag_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
