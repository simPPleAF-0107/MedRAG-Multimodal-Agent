version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: medrag_qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - ./vector-db:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: medrag_backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./.env:/app/.env
      - ./medrag.db:/app/medrag.db
      - ./vector-db:/app/vector-db
      # For image saving/uploads
      - ./data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: medrag_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  frontend-web:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: medrag_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
